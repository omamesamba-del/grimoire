<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Grimoire Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Themes (grimoire style.css と同値) ─────── */
    body {
      --bg: #0a0f1e; --text: #cbd5e1; --toolbar: #0f172a;
      --border: rgba(255,255,255,0.08); --text-muted: #475569;
    }
    body.theme-dark {
      --bg: #0a0f1e; --text: #cbd5e1; --toolbar: #0f172a;
      --border: rgba(255,255,255,0.08); --text-muted: #475569;
    }
    body.theme-gray {
      --bg: #1e1e1e; --text: #cccccc; --toolbar: #252526;
      --border: rgba(255,255,255,0.08); --text-muted: #888888;
    }
    body.theme-black {
      --bg: #000000; --text: #94a3b8; --toolbar: #0a0a0a;
      --border: rgba(255,255,255,0.06); --text-muted: #444444;
    }
    body.theme-light {
      --bg: #f1f5f9; --text: #0f172a; --toolbar: #e2e8f0;
      --border: rgba(0,0,0,0.1); --text-muted: #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* タイトルバー兼ツールバー */
    #toolbar {
      height: 34px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      /* Windows では右端 ~138px がネイティブウインドウコントロール領域 */
      padding-right: 144px;
      background: var(--toolbar);
      flex-shrink: 0;
      -webkit-app-region: drag;
    }
    #toolbar button {
      -webkit-app-region: no-drag;
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 0.78rem;
      width: 26px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    #toolbar button:hover { background: var(--border); color: var(--text); }
    #btn-always-top.active {
      background: rgba(99,102,241,0.18);
      color: #818cf8;
      border-color: #6366f1;
    }
    #filename {
      font-size: 0.70rem;
      color: var(--text-muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      -webkit-app-region: drag;
    }
    #timestamp {
      font-size: 0.68rem;
      color: var(--text-muted);
      opacity: 0.6;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    #img-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    #preview-img {
      /* ウインドウサイズに合わせて拡縮（縦横比維持） */
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      cursor: zoom-in;
    }
    #preview-img.zoomed {
      width: auto;
      height: auto;
      max-width: none;
      max-height: none;
      object-fit: none;
      cursor: zoom-out;
    }
    #waiting {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      line-height: 2;
      opacity: 0.5;
    }
    #waiting .icon { font-size: 2rem; display: block; margin-bottom: 8px; }
    #flash {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span id="filename">待機中…</span>
    <span id="timestamp"></span>
    <button type="button" id="btn-open-folder" title="フォルダを開く">📁</button>
    <button type="button" id="btn-always-top">📌</button>
  </div>
  <div id="img-container">
    <div id="waiting">
      <span class="icon">🖼️</span>
      生成された画像が自動で表示されます
    </div>
    <img id="preview-img" alt="preview">
    <div id="flash"></div>
  </div>

  <script>
    const { ipcRenderer, shell } = require('electron');

    let currentPath = null;
    let alwaysOnTop = false;
    const img       = document.getElementById('preview-img');
    const waiting   = document.getElementById('waiting');
    const filenameEl = document.getElementById('filename');
    const timestampEl = document.getElementById('timestamp');
    const flash     = document.getElementById('flash');
    const pinBtn    = document.getElementById('btn-always-top');

    function applyTheme(theme) {
      document.body.className = theme ? `theme-${theme}` : '';
    }

    function updatePinButton() {
      pinBtn.classList.toggle('active', alwaysOnTop);
      pinBtn.title = alwaysOnTop ? '最前面固定: オン' : '最前面固定: オフ';
    }

    // 起動時に現在のテーマを取得
    ipcRenderer.invoke('preview:get-theme').then(theme => { if (theme) applyTheme(theme); });

    // grimoire 側のテーマ変更に追従
    ipcRenderer.on('preview:theme', (_, theme) => { applyTheme(theme); });

    // 新しい画像
    ipcRenderer.on('preview:new-image', (_, filePath) => {
      currentPath = filePath;
      img.src = 'file:///' + filePath.replace(/\\/g, '/') + '?t=' + Date.now();
      img.style.display = 'block';
      waiting.style.display = 'none';
      img.classList.remove('zoomed');
      filenameEl.textContent = filePath.split(/[\\/]/).pop();
      timestampEl.textContent = new Date().toLocaleTimeString();
      flash.style.opacity = '1';
      setTimeout(() => { flash.style.opacity = '0'; }, 150);
    });

    // クリックでズーム切替
    img.addEventListener('click', () => {
      img.classList.toggle('zoomed');
    });

    document.getElementById('btn-open-folder').addEventListener('click', () => {
      if (currentPath) shell.showItemInFolder(currentPath);
    });

    pinBtn.addEventListener('click', () => {
      alwaysOnTop = !alwaysOnTop;
      ipcRenderer.send('preview:set-always-on-top', alwaysOnTop);
      updatePinButton();
    });

    // 初期状態：最前面固定OFF
    ipcRenderer.send('preview:set-always-on-top', false);
    updatePinButton();
  </script>
</body>
</html>
